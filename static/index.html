<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사내 AI 어시스턴트</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="layout">
        <!-- 사이드바 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>🤖 사내 AI 어시스턴트</h1>
                <p>AI-powered workplace tools</p>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-item active" data-page="qa">
                    <span>📋</span> 사규 Q&amp;A
                </button>
                <button class="nav-item" data-page="email">
                    <span>✉️</span> 이메일 작성
                </button>
            </nav>
        </aside>

        <!-- 메인 콘텐츠 -->
        <main class="main">

            <!-- 사규 Q&A 페이지 -->
            <div id="page-qa" class="page active">
                <div class="page-header">
                    <h2>사규 Q&amp;A</h2>
                    <p>사내 규정, 프로세스, 업무 절차에 대해 질문해주세요.</p>
                </div>
                <div class="chat-container">
                    <div id="chat-messages" class="chat-messages">
                        <div class="chat-empty">
                            <span class="icon">💬</span>
                            <p>궁금한 사내 규정이나 업무 절차를 질문해보세요.</p>
                        </div>
                    </div>
                    <div class="chat-input-area">
                        <textarea id="qa-input" placeholder="예) 연차 사용 규정이 어떻게 되나요?" rows="1"></textarea>
                        <button id="qa-submit" class="btn-primary">전송</button>
                    </div>
                </div>
            </div>

            <!-- 이메일 작성 페이지 -->
            <div id="page-email" class="page">
                <div class="page-header">
                    <h2>이메일 작성</h2>
                    <p>누구에게, 어떤 내용의 이메일을 보낼지 알려주시면 격식체로 작성해드립니다.</p>
                </div>
                <div class="email-container">
                    <!-- 입력 패널 -->
                    <div class="email-panel">
                        <span class="panel-title">요청 내용</span>
                        <textarea id="email-input" placeholder="예) 김철수 팀장님께 다음 주 월요일 오후 2시 회의 일정을 변경 요청하는 메일을 써줘"></textarea>
                        <div class="panel-actions">
                            <button id="email-submit" class="btn-primary">이메일 생성</button>
                        </div>
                    </div>

                    <!-- 결과 패널 -->
                    <div class="email-panel">
                        <span class="panel-title">생성된 이메일</span>

                        <div id="email-placeholder" class="email-placeholder">
                            <span class="icon">✉️</span>
                            <p>요청 내용을 입력하면 이메일이 생성됩니다.</p>
                        </div>

                        <div id="email-result" class="email-result" style="display:none">
                            <div class="email-field-group">
                                <span class="field-label">제목</span>
                                <div id="email-subject" class="email-field"></div>
                            </div>
                            <div class="email-field-group body">
                                <span class="field-label">본문</span>
                                <div id="email-body" class="email-field"></div>
                            </div>
                            <div class="panel-actions">
                                <button id="email-copy" class="btn-secondary">📋 복사</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
